services:
  transfers-service-kuspit:
    build: .
    container_name: 'transfers-service-kuspit'
    command: node --watch src/index.ts
    environment:
      - NODE_ENV=development
      - google_cloud_secrets
    ports:
      - '3032:3000'
    volumes:
      - ./:/app
    networks:
      - belugapay
    restart: unless-stopped
      
networks:
  belugapay:
    external: true